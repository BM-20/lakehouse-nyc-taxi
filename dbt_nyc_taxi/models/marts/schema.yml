version: 2

models:
  - name: peak_hours
    description: Identifies the busiest hours of the day for NYC taxi demand, categorised into time periods
    columns:
      - name: pickup_hour
        description: Hour of day (0-23)
        tests:
          - not_null
          - unique
      - name: total_trips
        description: Total trips during this hour
        tests:
          - not_null
      - name: avg_fare
        description: Average fare amount during this hour
      - name: avg_trip_distance
        description: Average trip distance during this hour
      - name: pct_of_daily_trips
        description: Percentage of total daily trips that occur during this hour
      - name: time_period
        description: Categorised time period (Morning Rush, Lunch, Evening Rush, Late Night, Off Peak)
        tests:
          - accepted_values:
              arguments:
                values: ['Morning Rush', 'Lunch', 'Evening Rush', 'Late Night', 'Off Peak']

  - name: revenue_by_payment
    description: Revenue and tip analysis broken down by payment method
    columns:
      - name: payment_type
        description: Payment method used
        tests:
          - not_null
          - unique
      - name: total_trips
        description: Total trips using this payment type
        tests:
          - not_null
      - name: total_revenue
        description: Total revenue generated by this payment type
      - name: avg_tip
        description: Average tip amount for this payment type
      - name: pct_of_total_revenue
        description: This payment type's share of total revenue
      - name: pct_of_total_trips
        description: This payment type's share of total trips

  - name: vendor_comparison
    description: Side by side comparison of the two NYC taxi vendors
    columns:
      - name: vendor_name
        description: Name of the taxi vendor
        tests:
          - not_null
          - unique
      - name: total_trips
        description: Total trips operated by this vendor
        tests:
          - not_null
      - name: avg_fare
        description: Average fare amount for this vendor
      - name: avg_distance
        description: Average trip distance for this vendor
      - name: avg_duration_minutes
        description: Average trip duration in minutes for this vendor
      - name: fare_per_mile
        description: Average fare divided by average distance — a normalised pricing metric
      - name: market_share_pct
        description: This vendor's share of total trips

  - name: weekly_trends
    description: Daily trip volume and revenue trends across January 2024, with day-over-day deltas
    columns:
      - name: pickup_date
        description: Date of taxi pickups
        tests:
          - not_null
          - unique
      - name: total_trips
        description: Total trips on this date
        tests:
          - not_null
      - name: total_revenue
        description: Total revenue on this date
      - name: avg_fare
        description: Average fare amount on this date
      - name: avg_trip_distance
        description: Average trip distance on this date
      - name: trips_vs_prev_day
        description: Change in total trips compared to the previous day
      - name: revenue_vs_prev_day
        description: Change in total revenue compared to the previous day